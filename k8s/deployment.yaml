apiVersion: apps/v1
kind: Deployment
metadata:
  name: meal-planner
  labels:
    app: meal-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meal-planner
  template:
    metadata:
      labels:
        app: meal-planner
    spec:
      containers:
        - name: meal-planner
          # Immutable pin. The tag is overridden at deploy time by the Kustomize
          # `images` entry in kustomization.yaml (kept current by CI). The value
          # here is a sane default for a raw `kubectl apply -f` and must never be
          # a mutable tag such as `latest`.
          image: ghcr.io/brandonmartinez/meal-planner:v1.0.0
          # Pinned, immutable tags are content-stable, so there is no need to
          # re-pull when the tag is already cached on the node.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meal-planner-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meal-planner-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: meal-planner-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meal-planner-secrets
                  key: google-client-secret
            - name: CLIENT_URL
              value: "https://meals.themartinez.cloud"
            - name: GOOGLE_CALLBACK_URL
              value: "https://meals.themartinez.cloud/api/auth/google/callback"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
