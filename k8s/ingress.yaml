apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meal-planner
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - meals.themartinez.cloud
      secretName: meal-planner-tls
  rules:
    - host: meals.themartinez.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meal-planner
                port:
                  number: 80
